# .github/workflows/keep_alive.yml
# Ejecuta el script keep_alive.js cada 2 días para evitar que el proyecto
# de Supabase se pause por inactividad en el plan gratuito.

name: Supabase Keep Alive

on:
  schedule:
    # Cron: a las 10:00 UTC cada 2 días (lunes, miércoles, viernes, domingo)
    # Formato: minuto hora día-mes mes día-semana
    - cron: "0 10 * * 1,3,5,0"
  workflow_dispatch: # Permite ejecutarlo manualmente desde la UI de GitHub

jobs:
  ping:
    name: Ping Supabase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependencias
        run: npm install --omit=dev

      - name: Ejecutar keep_alive.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/keep_alive.js
